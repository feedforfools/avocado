<!-- Toolbar -->
<div class="flex items-center justify-between mb-2 gap-4">

  <!-- Left: Status tabs -->
  <div role="tablist" class="tabs tabs-box tabs-sm">
    <button role="tab" class="tab {% if active_tab == 'aperte' %}tab-active{% endif %}"
      hx-get="{% url 'core:scadenze' %}"
      hx-target="#scadenze-body"
      hx-include="[name='q'],[name='sort'],[name='sort_dir']"
      hx-vals='{"tab": "aperte"}'
    >Aperte</button>
    <button role="tab" class="tab gap-1 {% if active_tab == 'scadute' %}tab-active{% endif %}"
      hx-get="{% url 'core:scadenze' %}"
      hx-target="#scadenze-body"
      hx-include="[name='q'],[name='sort'],[name='sort_dir']"
      hx-vals='{"tab": "scadute"}'
    >
      <iconify-icon icon="lucide:circle-alert" width="13" height="13"></iconify-icon>
      Scadute
    </button>
    <button role="tab" class="tab gap-1 {% if active_tab == 'in_scadenza' %}tab-active{% endif %}"
      hx-get="{% url 'core:scadenze' %}"
      hx-target="#scadenze-body"
      hx-include="[name='q'],[name='sort'],[name='sort_dir']"
      hx-vals='{"tab": "in_scadenza"}'
    >
      <iconify-icon icon="lucide:alarm-clock" width="13" height="13"></iconify-icon>
      In scadenza
    </button>
    <button role="tab" class="tab {% if active_tab == 'completate' %}tab-active{% endif %}"
      hx-get="{% url 'core:scadenze' %}"
      hx-target="#scadenze-body"
      hx-include="[name='q'],[name='sort'],[name='sort_dir']"
      hx-vals='{"tab": "completate"}'
    >Completate</button>
    <button role="tab" class="tab {% if active_tab == 'tutte' %}tab-active{% endif %}"
      hx-get="{% url 'core:scadenze' %}"
      hx-target="#scadenze-body"
      hx-include="[name='q'],[name='sort'],[name='sort_dir']"
      hx-vals='{"tab": "tutte"}'
    >Tutte</button>
  </div>

  <!-- Right: Search + Columns -->
  <div class="flex items-center gap-2">
    <input type="hidden" name="tab" value="{{ active_tab|default:'aperte' }}">
    <label class="input input-bordered input-sm flex items-center gap-2 w-72" x-data="{ q: '{{ search_query }}' }">
      <input type="text" name="q" class="grow" placeholder="Cerca scadenze, fascicoli..."
        x-ref="searchInput"
        x-model="q"
        hx-get="{% url 'core:scadenze' %}"
        hx-trigger="input changed delay:500ms, search"
        hx-target="#scadenze-table"
        hx-include="[name='tab'],[name='sort'],[name='sort_dir']"
      />
      <button type="button" class="flex items-center cursor-pointer opacity-50 hover:opacity-100"
              x-show="q.length > 0" x-cloak
              @click="q = ''; $nextTick(() => htmx.trigger($refs.searchInput, 'search'))">
        <iconify-icon icon="lucide:x" width="16" height="16"></iconify-icon>
      </button>
      <iconify-icon x-show="q.length === 0" icon="lucide:search" width="16" height="16" class="opacity-50"></iconify-icon>
    </label>

    <!-- Columns dropdown -->
    <div class="relative">
      <button class="btn btn-sm gap-1" @click="openColumns()">
        Colonne
        <iconify-icon icon="lucide:chevron-down" width="14" height="14"></iconify-icon>
      </button>
      <div
        x-show="columnsOpen"
        x-cloak
        @click.outside="cancelColumns()"
        x-transition
        class="absolute right-0 top-full mt-1 z-50 bg-base-100 border border-base-300 rounded-lg shadow-lg p-4 w-56"
      >
        <h3 class="font-semibold text-sm mb-3">Colonne visibili</h3>
        <div class="flex flex-col gap-2">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.label" />
            <span class="text-sm">Scadenza</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.fascicolo" />
            <span class="text-sm">Fascicolo</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.proceeding_type" />
            <span class="text-sm">Tipo procedimento</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.due_date" />
            <span class="text-sm">Data scadenza</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.source" />
            <span class="text-sm">Origine</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.notes" />
            <span class="text-sm">Note</span>
          </label>
        </div>
        <div class="flex gap-2 mt-4">
          <button class="btn btn-primary btn-sm flex-1" @click="applyColumns()">Applica</button>
          <button class="btn btn-ghost btn-sm flex-1" @click="cancelColumns()">Annulla</button>
        </div>
      </div>
    </div>
  </div>
</div>

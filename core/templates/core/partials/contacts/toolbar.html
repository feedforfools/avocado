  <!-- Toolbar -->
  <div class="flex items-center justify-between mb-2 gap-4">
    <!-- Left: Category tabs -->
    <div role="tablist" class="tabs tabs-box tabs-sm">
      <button role="tab" class="tab {% if active_tab == 'tutti' %}tab-active{% endif %}"
        hx-get="{% url 'core:contacts' %}"
        hx-target="#contacts-body"
        hx-include="[name='q'],[name='sort'],[name='sort_dir']"
        hx-vals='{"tab": "tutti"}'
      >Tutti</button>
      <button role="tab" class="tab gap-1 {% if active_tab == 'preferiti' %}tab-active{% endif %}"
        hx-get="{% url 'core:contacts' %}"
        hx-target="#contacts-body"
        hx-include="[name='q'],[name='sort'],[name='sort_dir']"
        hx-vals='{"tab": "preferiti"}'
      >
        <iconify-icon icon="lucide:star" width="14" height="14"></iconify-icon>
        Preferiti
      </button>
      <button role="tab" class="tab gap-1 {% if active_tab == 'persone' %}tab-active{% endif %}"
        hx-get="{% url 'core:contacts' %}"
        hx-target="#contacts-body"
        hx-include="[name='q'],[name='sort'],[name='sort_dir']"
        hx-vals='{"tab": "persone"}'
      >
        <iconify-icon icon="lucide:users" width="14" height="14"></iconify-icon>
        Persone
      </button>
      <button role="tab" class="tab gap-1 {% if active_tab == 'aziende' %}tab-active{% endif %}"
        hx-get="{% url 'core:contacts' %}"
        hx-target="#contacts-body"
        hx-include="[name='q'],[name='sort'],[name='sort_dir']"
        hx-vals='{"tab": "aziende"}'
      >
        <iconify-icon icon="lucide:building-2" width="14" height="14"></iconify-icon>
        Aziende
      </button>
    </div>

    <!-- Right: Search + Columns -->
    <div class="flex items-center gap-2">
      <input type="hidden" name="tab" value="{{ active_tab|default:'tutti' }}">
      <label class="input input-bordered input-sm flex items-center gap-2" x-data="{ q: '{{ search_query }}' }">
        <input type="text" name="q" class="grow" placeholder="Cerca contatti..."
          x-ref="searchInput"
          x-model="q"
          hx-get="{% url 'core:contacts' %}"
          hx-trigger="input changed delay:500ms, search"
          hx-target="#contacts-table"
          hx-include="[name='tab'],[name='sort'],[name='sort_dir']"
        />
        <button type="button" class="flex items-center cursor-pointer opacity-50 hover:opacity-100" x-show="q.length > 0" x-cloak
          @click="q = ''; $nextTick(() => htmx.trigger($refs.searchInput, 'search'))">
          <iconify-icon icon="lucide:x" width="16" height="16"></iconify-icon>
        </button>
        <iconify-icon x-show="q.length === 0" icon="lucide:search" width="16" height="16" class="opacity-50"></iconify-icon>
      </label>

      <!-- Columns dropdown -->
      <div class="relative">
        <button class="btn btn-sm gap-1" @click="openColumns()">
          Colonne
          <iconify-icon icon="lucide:chevron-down" width="14" height="14"></iconify-icon>
        </button>
        <div
          x-show="columnsOpen"
          x-cloak
          @click.outside="cancelColumns()"
          x-transition
          class="absolute right-0 top-full mt-1 z-50 bg-base-100 border border-base-300 rounded-lg shadow-lg p-4 w-64"
        >
          <h3 class="font-semibold text-sm mb-3">Colonne visibili</h3>
          <div class="flex flex-col gap-2">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.name" />
              <span class="text-sm">Nome</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.role" />
              <span class="text-sm">Ruolo</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.address" />
              <span class="text-sm">Indirizzo</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.phone" />
              <span class="text-sm">Telefono</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="checkbox checkbox-sm" x-model="pendingColumns.email" />
              <span class="text-sm">Email</span>
            </label>
          </div>
          <div class="flex items-center gap-2 mt-4 justify-end">
            <button class="btn btn-primary btn-sm" @click="applyColumns()">Aggiorna</button>
            <button class="btn btn-ghost btn-sm" @click="cancelColumns()">Annulla</button>
          </div>
        </div>
      </div>
    </div>
  </div>

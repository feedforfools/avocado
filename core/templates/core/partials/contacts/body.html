<div
  x-data="{
    checked: [],
    total: {{ page_obj|length }},
    columns: $persist({ name: true, role: true, address: true, phone: true, email: true }).as('columns_contacts'),
    columnsOpen: false,
    pendingColumns: {},
    openColumns() {
      this.pendingColumns = { ...this.columns };
      this.columnsOpen = true;
    },
    applyColumns() {
      this.columns = { ...this.pendingColumns };
      this.columnsOpen = false;
    },
    cancelColumns() {
      this.columnsOpen = false;
    }
  }"
>
  {% include "core/partials/contacts/toolbar.html" %}
  <div id="contacts-table">
    {% include "core/partials/contacts/table.html" %}
  </div>
</div>
